name: Publish StructBX Docker image and static binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Skip Docker push and release upload (build + smoke test only)'
        type: boolean
        default: true
  pull_request:
    branches: [dev, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ \
            libssl-dev zlib1g-dev \
            python3-pip
          sudo npm install -g npm

      - name: Install web dependencies
        working-directory: ./web
        run: npm install

      - name: Install Conan and setup profile
        run: |
          pip3 install conan
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Install dependencies via Conan
        run: |
          conan install . --build=missing -s build_type=Release

      - name: Configure and build (static release)
        run: |
          cmake -S . -B build-static \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_STATIC=ON \
            -DCMAKE_INSTALL_PREFIX=/tmp/structbx-install
          cmake --build build-static --parallel $(nproc)
          cmake --install build-static --prefix /tmp/structbx-install

      - name: Package binary
        run: |
          cp /tmp/structbx-install/bin/structbx-server /tmp/structbx-server-linux-amd64
          strip /tmp/structbx-server-linux-amd64

      - name: Package web files
        run: |
          tar czf /tmp/structbx-web.tar.gz -C web .

      - name: Smoke test (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: /tmp/structbx-server-linux-amd64 --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: structbx-server
          path: /tmp/structbx-server-linux-amd64

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: structbx-web
          path: /tmp/structbx-web.tar.gz

  publish-docker:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.dry-run == 'false')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install cosign
        if: github.event_name == 'release'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        with:
          context: .
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        if: github.event_name == 'release'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  upload-release-assets:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    if: github.event_name == 'release'

    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: structbx-server
          path: /tmp

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: structbx-web
          path: /tmp

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            /tmp/structbx-server-linux-amd64 \
            /tmp/structbx-web.tar.gz \
            --clobber
